<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Assessment Engine</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --bg-main: #0f172a;
            --bg-surface: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: #334155;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        .assessment-wrapper {
            max-width: 720px;
            margin: 60px auto;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .engine-title {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            color: var(--text-primary);
            margin-bottom: 32px;
            text-align: center;
        }

        .section-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .input-area {
            width: 100%;
            height: 320px;
            background-color: var(--bg-surface);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            font-size: 0.9rem;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            box-sizing: border-box;
            resize: vertical;
            line-height: 1.5;
        }

        .input-area:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .action-button {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            background-color: var(--primary);
            color: #ffffff;
            border: none;
            padding: 14px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.15s ease, transform 0.1s ease;
        }

        .action-button:hover:not(:disabled) {
            background-color: var(--primary-hover);
        }

        .action-button:active:not(:disabled) {
            transform: scale(0.98);
        }

        .action-button:disabled {
            background-color: #475569;
            color: #94a3b8;
            cursor: not-allowed;
        }

        .meta-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .progress-tracker {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .score-tracker {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--success);
        }

        .card-surface {
            background-color: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .prompt-text {
            margin-top: 0;
            margin-bottom: 24px;
            line-height: 1.6;
            font-size: 1.15rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .responses-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .response-label {
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: #1e293b;
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: border-color 0.15s ease, background-color 0.15s ease;
        }

        .response-label input {
            accent-color: var(--primary);
            width: 16px;
            height: 16px;
            margin: 0;
            cursor: pointer;
        }

        .response-label:hover:not(.state-correct):not(.state-incorrect) {
            border-color: #475569;
            background-color: #243249;
        }

        .response-label.state-selected {
            border-color: var(--primary);
            background-color: rgba(59, 130, 246, 0.08);
        }

        .response-label.state-correct {
            border-color: var(--success) !important;
            background-color: rgba(16, 185, 129, 0.08) !important;
            color: var(--success);
            font-weight: 500;
        }

        .response-label.state-incorrect {
            border-color: var(--danger) !important;
            background-color: rgba(239, 68, 68, 0.08) !important;
            color: var(--danger);
        }

        .summary-view {
            text-align: center;
            background-color: var(--bg-surface);
            border-radius: 12px;
            padding: 48px 32px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .metric-display {
            font-size: 1.25rem;
            margin: 24px 0;
            color: var(--text-secondary);
        }

        .metric-value {
            color: var(--success);
            font-weight: 700;
            font-size: 2.5rem;
            display: block;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const shuffleArray = (array) => {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        };

        function QuizApp() {
            const [rawText, setRawText] = useState('');
            const [questions, setQuestions] = useState([]);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [selectedAnswer, setSelectedAnswer] = useState('');
            const [isAnswered, setIsAnswered] = useState(false);
            const [score, setScore] = useState(0);
            const [quizStarted, setQuizStarted] = useState(false);
            const [quizFinished, setQuizFinished] = useState(false);

            const parseQuestions = () => {
                if (!rawText.trim()) return;

                const rawBlocks = rawText.split(/(?=\b\d+[\)\.]\s+)/);
                const parsedQuestions = [];

                rawBlocks.forEach((block) => {
                    const lines = block.split('\n').map(line => line.trim()).filter(Boolean);
                    if (lines.length < 2) return;

                    let questionText = '';
                    const options = [];
                    let correctAnswerLetter = '';

                    lines.forEach((line) => {
                        if (/^(answer)\s*:\s*([a-d])/i.test(line)) {
                            const match = line.match(/^(answer)\s*:\s*([a-d])/i);
                            if (match) correctAnswerLetter = match[2].toLowerCase();
                        }
                        else if (/^[a-d][\)\.]\s+/i.test(line) && !line.toLowerCase().startsWith('answer')) {
                            options.push(line);
                        } 
                        else {
                            questionText += (questionText ? '\n' : '') + line;
                        }
                    });

                    questionText = questionText.replace(/Answer\s*:\s*[a-d]/gi, '').trim();

                    let finalCorrectOption = '';
                    if (correctAnswerLetter && options.length > 0) {
                        const found = options.find(opt => opt.toLowerCase().trim().startsWith(correctAnswerLetter));
                        if (found) finalCorrectOption = found;
                    }

                    if (questionText && options.length > 0) {
                        const randomizedOptions = shuffleArray(options);
                        parsedQuestions.push({
                            question: questionText,
                            options: randomizedOptions,
                            correctAnswer: finalCorrectOption
                        });
                    }
                });

                if (parsedQuestions.length > 0) {
                    const randomizedQuestions = shuffleArray(parsedQuestions);
                    setQuestions(randomizedQuestions);
                    setQuizStarted(true);
                    setQuizFinished(false);
                    setCurrentIdx(0);
                    setScore(0);
                    setSelectedAnswer('');
                    setIsAnswered(false);
                } else {
                    alert('Invalid assessment structure. Please ensure the format contains question numbers, alphanumeric choices (a, b, c, d), and corresponding answer markers.');
                }
            };

            const handleOptionSelect = (option) => {
                if (isAnswered) return;
                setSelectedAnswer(option);
            };

            const checkAnswer = () => {
                if (!selectedAnswer) return;
                
                const currentQuestion = questions[currentIdx];
                if (currentQuestion.correctAnswer && selectedAnswer === currentQuestion.correctAnswer) {
                    setScore(prev => prev + 1);
                }
                setIsAnswered(true);
            };

            const handleNext = () => {
                setCurrentIdx(prev => prev + 1);
                setSelectedAnswer('');
                setIsAnswered(false);
            };

            const handleFinish = () => {
                setQuizFinished(true);
            };

            const handleRestart = () => {
                setQuizStarted(false);
                setQuizFinished(false);
                setRawText('');
            };

            return (
                <div className="assessment-wrapper">
                    <h1 className="engine-title">Academic Assessment Engine</h1>

                    {!quizStarted ? (
                        <div>
                            <label className="section-label">Paste Raw Examination Dataset</label>
                            <textarea
                                className="input-area"
                                placeholder="Paste structured questions, choices, and answer blocks directly..."
                                value={rawText}
                                onChange={(e) => setRawText(e.target.value)}
                            />
                            <button className="action-button" onClick={parseQuestions}>Initialize Randomized Assessment</button>
                        </div>
                    ) : quizFinished ? (
                        <div className="summary-view">
                            <h2>Assessment Concluded</h2>
                            <div className="metric-display">
                                Final Performance Score:
                                <span className="metric-value">{score} / {questions.length}</span>
                            </div>
                            <button className="action-button" onClick={handleRestart}>Initialize New Dataset</button>
                        </div>
                    ) : (
                        <div>
                            <div className="meta-container">
                                <span className="progress-tracker">Question {currentIdx + 1} of {questions.length}</span>
                                <span className="score-tracker">Score: {score}</span>
                            </div>
                            
                            <div className="card-surface">
                                <h3 className="prompt-text">{questions[currentIdx]?.question}</h3>
                                <div className="responses-group">
                                    {questions[currentIdx]?.options.map((option, index) => {
                                        const isCorrect = option === questions[currentIdx]?.correctAnswer;
                                        const isSelected = option === selectedAnswer;
                                        
                                        let stateClass = '';
                                        if (isAnswered) {
                                            if (isCorrect) stateClass = 'state-correct';
                                            else if (isSelected && !isCorrect) stateClass = 'state-incorrect';
                                        } else if (isSelected) {
                                            stateClass = 'state-selected';
                                        }

                                        return (
                                            <label key={index} className={`response-label ${stateClass}`}>
                                                <input
                                                    type="radio"
                                                    name="quiz-option"
                                                    value={option}
                                                    checked={isSelected}
                                                    disabled={isAnswered}
                                                    onChange={() => handleOptionSelect(option)}
                                                />
                                                <span>{option}</span>
                                            </label>
                                        );
                                    })}
                                </div>
                            </div>

                            <div>
                                {!isAnswered ? (
                                    <button 
                                        className="action-button" 
                                        onClick={checkAnswer} 
                                        disabled={!selectedAnswer}
                                    >
                                        Submit Answer
                                    </button>
                                ) : currentIdx < questions.length - 1 ? (
                                    <button className="action-button" onClick={handleNext}>Proceed to Next Question</button>
                                ) : (
                                    <button className="action-button" onClick={handleFinish}>Generate Performance Analysis</button>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<QuizApp />);
    </script>
</body>
</html>
