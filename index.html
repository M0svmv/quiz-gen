<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Assessment Engine</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

    <style>
        :root {
            --bg-main: #0f172a;
            --bg-surface: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: #334155;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        .assessment-wrapper {
            max-width: 720px;
            margin: 60px auto;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .engine-title {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            color: var(--text-primary);
            margin-bottom: 32px;
            text-align: center;
        }

        .section-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .input-area {
            width: 100%;
            height: 240px;
            background-color: var(--bg-surface);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            font-size: 0.9rem;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            box-sizing: border-box;
            resize: vertical;
            line-height: 1.6;
            margin-bottom: 16px;
            white-space: pre-wrap;
        }

        .input-area:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .file-upload-zone {
            display: block;
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 32px 24px;
            text-align: center;
            background-color: rgba(30, 41, 59, 0.5);
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .file-upload-zone:hover {
            border-color: var(--primary);
            background-color: rgba(59, 130, 246, 0.02);
        }

        .file-input {
            display: none;
        }

        .action-button {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            background-color: var(--primary);
            color: #ffffff;
            border: none;
            padding: 14px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 12px;
            transition: background-color 0.15s ease, transform 0.1s ease;
        }

        .action-button:hover:not(:disabled) {
            background-color: var(--primary-hover);
        }

        .action-button:active:not(:disabled) {
            transform: scale(0.98);
        }

        .action-button:disabled {
            background-color: #475569;
            color: #94a3b8;
            cursor: not-allowed;
        }

        .secondary-actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .secondary-button {
            flex: 1;
            background-color: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            padding: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .secondary-button:hover {
            color: var(--text-primary);
            border-color: #475569;
            background-color: rgba(255, 255, 255, 0.02);
        }

        .meta-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .progress-tracker {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .score-tracker {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--success);
        }

        .card-surface {
            background-color: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .prompt-text {
            margin-top: 0;
            margin-bottom: 24px;
            line-height: 1.6;
            font-size: 1.15rem;
            font-weight: 500;
            color: var(--text-primary);
            white-space: pre-wrap;
        }

        .responses-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .response-label {
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: #1e293b;
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: border-color 0.15s ease, background-color 0.15s ease;
        }

        .response-label input {
            accent-color: var(--primary);
            width: 16px;
            height: 16px;
            margin: 0;
            cursor: pointer;
        }

        .response-label:hover:not(.state-correct):not(.state-incorrect) {
            border-color: #475569;
            background-color: #243249;
        }

        .response-label.state-selected {
            border-color: var(--primary);
            background-color: rgba(59, 130, 246, 0.08);
        }

        .response-label.state-correct {
            border-color: var(--success) !important;
            background-color: rgba(16, 185, 129, 0.08) !important;
            color: var(--success);
            font-weight: 500;
        }

        .response-label.state-incorrect {
            border-color: var(--danger) !important;
            background-color: rgba(239, 68, 68, 0.08) !important;
            color: var(--danger);
        }

        .summary-view {
            text-align: center;
            background-color: var(--bg-surface);
            border-radius: 12px;
            padding: 48px 32px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .metric-display {
            font-size: 1.25rem;
            margin: 24px 0;
            color: var(--text-secondary);
        }

        .metric-value {
            color: var(--success);
            font-weight: 700;
            font-size: 2.5rem;
            display: block;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const shuffleArray = (array) => {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        };

        function QuizApp() {
            const [rawText, setRawText] = useState(() => localStorage.getItem('quiz_rawText') || '');
            const [questions, setQuestions] = useState(() => JSON.parse(localStorage.getItem('quiz_questions')) || []);
            const [currentIdx, setCurrentIdx] = useState(() => parseInt(localStorage.getItem('quiz_currentIdx')) || 0);
            const [selectedAnswer, setSelectedAnswer] = useState(() => localStorage.getItem('quiz_selectedAnswer') || '');
            const [isAnswered, setIsAnswered] = useState(() => localStorage.getItem('quiz_isAnswered') === 'true');
            const [score, setScore] = useState(() => parseInt(localStorage.getItem('quiz_score')) || 0);
            const [quizStarted, setQuizStarted] = useState(() => localStorage.getItem('quiz_quizStarted') === 'true');
            const [quizFinished, setQuizFinished] = useState(() => localStorage.getItem('quiz_quizFinished') === 'true');
            const [fileName, setFileName] = useState(() => localStorage.getItem('quiz_fileName') || '');

            useEffect(() => {
                localStorage.setItem('quiz_rawText', rawText);
                localStorage.setItem('quiz_questions', JSON.stringify(questions));
                localStorage.setItem('quiz_currentIdx', currentIdx);
                localStorage.setItem('quiz_selectedAnswer', selectedAnswer);
                localStorage.setItem('quiz_isAnswered', isAnswered);
                localStorage.setItem('quiz_score', score);
                localStorage.setItem('quiz_quizStarted', quizStarted);
                localStorage.setItem('quiz_quizFinished', quizFinished);
                localStorage.setItem('quiz_fileName', fileName);
            }, [rawText, questions, currentIdx, selectedAnswer, isAnswered, score, quizStarted, quizFinished, fileName]);

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setFileName(file.name);

                if (file.name.endsWith('.docx')) {
                    const reader = new FileReader();
                    reader.onload = function (event) {
                        const arrayBuffer = event.target.result;
                        mammoth.extractRawText({ arrayBuffer: arrayBuffer })
                            .then((result) => {
                                const formattedText = result.value.replace(/\r\n/g, '\n').replace(/\n{3,}/g, '\n\n');
                                setRawText(formattedText);
                            })
                            .catch((err) => {
                                alert("Error processing Word document.");
                                console.error(err);
                            });
                    };
                    reader.readAsArrayBuffer(file);
                } else {
                    const reader = new FileReader();
                    reader.onload = function (event) {
                        setRawText(event.target.result);
                    };
                    reader.readAsText(file);
                }
            };

            const parseQuestions = () => {
                if (!rawText.trim()) return;

                // تقسيم النص بناءً على كلمة Answer التوضيحية لفرز كل كتلة سؤال على حدة وبذكاء
                const rawBlocks = rawText.split(/(?<=Answer\s*:\s*[a-d]\n?)/gi);
                const parsedQuestions = [];

                rawBlocks.forEach((block) => {
                    if (!block.trim()) return;

                    // تقسيم السطور مع تنظيف الفراغات المحيطة والحفاظ على بنيتها الداخلية
                    let lines = block.split('\n').map(line => line.trim()).filter(Boolean);
                    if (lines.length < 2) return;

                    // البحث عن سطر الإجابة واستخلاصه أولاً
                    let correctAnswerLetter = '';
                    let answerLineIdx = lines.findIndex(l => /^(answer)\s*:\s*([a-d])/i.test(l));
                    
                    if (answerLineIdx !== -1) {
                        const match = lines[answerLineIdx].match(/^(answer)\s*:\s*([a-d])/i);
                        if (match) correctAnswerLetter = match[2].toLowerCase();
                        lines.splice(answerLineIdx, 1); // إزالة سطر الإجابة من مصفوفة الفرز لكي لا يختلط بالاختيارات
                    }

                    if (!correctAnswerLetter) return; // تخطي البلوك إذا لم يعثر على إجابة واضحة له

                    let questionText = '';
                    let rawOptions = [];

                    // فحص السطور المتبقية: هل الاختيارات مدمجة في سطر واحد أم مفرودة؟
                    lines.forEach((line) => {
                        // كشف السطور المدمجة مثل: A) Control A B) Control B C) Control C
                        if (/[A-D]\)\s+.*[A-D]\)\s+/i.test(line)) {
                            const splitMatches = line.split(/(?=[A-D]\)\s+)/i);
                            rawOptions.push(...splitMatches.map(o => o.trim()));
                        } 
                        // كشف السطور الفردية التي تبدأ بحرف الترقيم المباشر
                        else if (/^[a-d][\)\.]\s+/i.test(line)) {
                            rawOptions.push(line);
                        } 
                        // إذا كان سطر بدون حرف ترقيم ولكنه ليس رأس السؤال (الأسئلة الأولى في ملفك)
                        else if (questionText !== '' && rawOptions.length < 4 && !/^\d+[\)\.]/i.test(line)) {
                            rawOptions.push(line);
                        } 
                        // تجميع نص السؤال الأساسي
                        else {
                            questionText += (questionText ? '\n' : '') + line;
                        }
                    });

                    // تنظيف أي أرقام ترتيبية في بداية نص السؤال لجعله منسقًا داخل المحاكي
                    questionText = questionText.replace(/^\d+[\)\.]\s*/, '').trim();

                    // إعادة صياغة الاختيارات المكتوبة بدون حروف (النمط الأول في ملفك) لتصبح مدعومة بشكل قياسي ومقروء
                    let finalOptions = rawOptions.map((opt, index) => {
                        if (/^[a-d][\)\.]/i.test(opt)) return opt;
                        const letters = ['a) ', 'b) ', 'c) ', 'd) '];
                        return (letters[index] ? letters[index] : '') + opt;
                    });

                    // تحديد الاختيار الصحيح بمطابقة الحرف المستخرج
                    let finalCorrectOption = '';
                    if (correctAnswerLetter && finalOptions.length > 0) {
                        const found = finalOptions.find(opt => opt.toLowerCase().trim().startsWith(correctAnswerLetter));
                        if (found) finalCorrectOption = found;
                    }

                    if (questionText && finalOptions.length > 0) {
                        const randomizedOptions = shuffleArray(finalOptions);
                        parsedQuestions.push({
                            question: questionText,
                            options: randomizedOptions,
                            correctAnswer: finalCorrectOption
                        });
                    }
                });

                if (parsedQuestions.length > 0) {
                    setQuestions(shuffleArray(parsedQuestions));
                    setQuizStarted(true);
                    setQuizFinished(false);
                    setCurrentIdx(0);
                    setScore(0);
                    setSelectedAnswer('');
                    setIsAnswered(false);
                } else {
                    alert('Could not find any structural questions. Please check format.');
                }
            };

            const handleOptionSelect = (option) => {
                if (isAnswered) return;
                setSelectedAnswer(option);
            };

            const checkAnswer = () => {
                if (!selectedAnswer) return;
                const currentQuestion = questions[currentIdx];
                if (currentQuestion.correctAnswer && selectedAnswer === currentQuestion.correctAnswer) {
                    setScore(prev => prev + 1);
                }
                setIsAnswered(true);
            };

            const handleNext = () => {
                setCurrentIdx(prev => prev + 1);
                setSelectedAnswer('');
                setIsAnswered(false);
            };

            const handleFinish = () => {
                setQuizFinished(true);
            };

            const handleRestartSameQuiz = () => {
                const remixedQuestions = questions.map(q => ({
                    ...q,
                    options: shuffleArray(q.options)
                }));
                setQuestions(shuffleArray(remixedQuestions));
                setCurrentIdx(0);
                setScore(0);
                setSelectedAnswer('');
                setIsAnswered(false);
                setQuizFinished(false);
                setQuizStarted(true);
            };

            const handleResetAll = () => {
                localStorage.clear();
                setRawText('');
                setQuestions([]);
                setCurrentIdx(0);
                setSelectedAnswer('');
                setIsAnswered(false);
                setScore(0);
                setQuizStarted(false);
                setQuizFinished(false);
                setFileName('');
            };

            return (
                <div className="assessment-wrapper">
                    <h1 className="engine-title">Academic Assessment Engine</h1>

                    {!quizStarted ? (
                        <div>
                            <label className="section-label">Upload Examination File (.docx / .txt)</label>
                            <label className="file-upload-zone">
                                <input 
                                    type="file" 
                                    className="file-input" 
                                    accept=".docx,.txt" 
                                    onChange={handleFileUpload} 
                                />
                                {fileName ? `Selected: ${fileName}` : "Click to upload Word (.docx) or Text (.txt) file"}
                            </label>

                            <label className="section-label">Review / Edit Extracted Dataset Text</label>
                            <textarea
                                className="input-area"
                                placeholder="Paste or upload structured questions..."
                                value={rawText}
                                onChange={(e) => setRawText(e.target.value)}
                            />
                            <button className="action-button" onClick={parseQuestions} disabled={!rawText.trim()}>
                                Initialize Randomized Assessment
                            </button>
                        </div>
                    ) : quizFinished ? (
                        <div className="summary-view">
                            <h2>Assessment Concluded</h2>
                            <div className="metric-display">
                                Final Performance Score:
                                <span className="metric-value">{score} / {questions.length}</span>
                            </div>
                            <button className="action-button" onClick={handleRestartSameQuiz}>
                                Retake Same Quiz Again
                            </button>
                            <button className="action-button" style={{backgroundColor: '#475569'}} onClick={handleResetAll}>
                                Upload New Dataset
                            </button>
                        </div>
                    ) : (
                        <div>
                            <div className="meta-container">
                                <span className="progress-tracker">Question {currentIdx + 1} of {questions.length}</span>
                                <span className="score-tracker">Score: {score}</span>
                            </div>
                            
                            <div className="card-surface">
                                <h3 className="prompt-text">{questions[currentIdx]?.question}</h3>
                                <div className="responses-group">
                                    {questions[currentIdx]?.options.map((option, index) => {
                                        const isCorrect = option === questions[currentIdx]?.correctAnswer;
                                        const isSelected = option === selectedAnswer;
                                        
                                        let stateClass = '';
                                        if (isAnswered) {
                                            if (isCorrect) stateClass = 'state-correct';
                                            else if (isSelected && !isCorrect) stateClass = 'state-incorrect';
                                        } else if (isSelected) {
                                            stateClass = 'state-selected';
                                        }

                                        return (
                                            <label key={index} className={`response-label ${stateClass}`}>
                                                <input
                                                    type="radio"
                                                    name="quiz-option"
                                                    value={option}
                                                    checked={isSelected}
                                                    disabled={isAnswered}
                                                    onChange={() => handleOptionSelect(option)}
                                                />
                                                <span>{option}</span>
                                            </label>
                                        );
                                    })}
                                </div>
                            </div>

                            <div>
                                {!isAnswered ? (
                                    <button 
                                        className="action-button" 
                                        onClick={checkAnswer} 
                                        disabled={!selectedAnswer}
                                    >
                                        Submit Answer
                                    </button>
                                ) : currentIdx < questions.length - 1 ? (
                                    <button className="action-button" onClick={handleNext}>Proceed to Next Question</button>
                                ) : (
                                    <button className="action-button" onClick={handleFinish}>Generate Performance Analysis</button>
                                )}
                            </div>

                            <div className="secondary-actions">
                                <button className="secondary-button" onClick={handleRestartSameQuiz}>
                                    Restart This Quiz
                                </button>
                                <button className="secondary-button" onClick={handleResetAll}>
                                    Clear & Start New
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<QuizApp />);
    </script>
</body>
</html>
